<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maa Narmada Yoga - Verify Invoice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1b6e2e;
      --green-dark: #145a25;
      --green-light: #e8f5e9;
      --border: #d0d0d0;
      --text: #111;
      --muted: #555;
      --pink: #e91e63;
      --bg: #f5f5f5;
    }
    body { font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrapper { max-width: 700px; margin: 0 auto; padding: 0 16px 48px; }

    /* HEADER */
    .site-header { text-align: center; padding: 28px 0 20px; }
    .site-header img#headerLogo {
      width: 100px; height: 100px; border-radius: 50%;
      object-fit: cover; display: block; margin: 0 auto 14px;
      border: 3px solid var(--green);
      box-shadow: 0 2px 16px rgba(27,110,46,0.25);
    }
    .site-header h1 { font-size: clamp(18px, 5vw, 26px); font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .inv-verif { font-size: clamp(13px, 3.5vw, 16px); font-weight: 700; color: var(--green); margin-bottom: 8px; }
    .contact { font-size: clamp(13px, 3.5vw, 15px); color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 5px; }
    .contact .phone-icon { color: var(--pink); font-size: 16px; }

    .divider, .divider-bottom { border: none; border-top: 2px solid #ccc; margin: 16px 0 22px; }
    .divider-bottom { margin: 28px 0 14px; }

    /* FORM CARD */
    .form-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: clamp(18px, 5vw, 32px); margin-bottom: 20px; }
    .verify-heading { font-size: clamp(15px, 4vw, 19px); font-weight: 700; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .verify-heading::before { content: ""; display: block; width: 4px; height: 20px; background: var(--green); border-radius: 2px; }
    .form-row { display: flex; align-items: center; margin-bottom: 14px; gap: 10px; }
    .form-row label { font-size: clamp(13px, 3.5vw, 15px); font-weight: 600; color: var(--text); min-width: 145px; flex-shrink: 0; }
    .form-row input { flex: 1; min-width: 0; padding: 10px 12px; border: 1.5px solid var(--border); font-size: clamp(13px, 3.5vw, 15px); font-family: inherit; border-radius: 8px; background: #fafafa; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-row input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(27,110,46,0.12); background: #fff; }
    @media (max-width: 480px) {
      .form-row { flex-direction: column; align-items: flex-start; gap: 5px; }
      .form-row label { min-width: unset; width: 100%; }
      .form-row input { width: 100%; }
    }
    .btn-verify { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 12px 24px; border: none; background: var(--green); color: #fff; font-size: clamp(13px, 3.5vw, 15px); font-family: inherit; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 4px; box-shadow: 0 2px 8px rgba(27,110,46,0.22); transition: background 0.18s; }
    .btn-verify:hover { background: var(--green-dark); }
    #msg { font-size: clamp(13px, 3.5vw, 15px); font-weight: 600; min-height: 22px; margin: 12px 0 6px; text-align: center; }
    #invoiceList { display: none; margin-bottom: 14px; padding: 10px 12px; border: 1.5px solid var(--border); font-size: clamp(13px, 3.5vw, 14px); font-family: inherit; width: 100%; border-radius: 8px; background: #fafafa; }

    /* INVOICE CARD */
    #invoiceCard { display: none; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); overflow: hidden; margin-bottom: 16px; }
    .inv-card-header { text-align: center; padding: clamp(16px,4vw,24px) 20px clamp(12px,3vw,16px); border-bottom: 1px solid #e8e8e8; background: linear-gradient(135deg,#f9fff9 0%,#fff 100%); }
    .inv-card-header img {
      width: clamp(70px, 18vw, 90px);
      height: clamp(70px, 18vw, 90px);
      border-radius: 50%; object-fit: cover; display: block;
      margin: 0 auto 10px;
      border: 3px solid var(--green);
      box-shadow: 0 2px 12px rgba(27,110,46,0.2);
    }
    .inv-card-header .company-name { font-size: clamp(15px, 4vw, 19px); font-weight: 700; color: var(--text); }
    .inv-card-body { padding: clamp(14px,4vw,20px) clamp(14px,4vw,24px) 10px; position: relative; overflow: hidden; }
    .inv-watermark {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(160px, 40vw, 260px);
      height: clamp(160px, 40vw, 260px);
      object-fit: contain; border-radius: 50%;
      opacity: 0.12; pointer-events: none; z-index: 0;
    }
    .inv-valid-label { font-size: clamp(13px,3.5vw,15px); font-weight: 700; color: #2e7d32; margin-bottom: 12px; position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; background: var(--green-light); padding: 7px 12px; border-radius: 7px; border: 1px solid #c8e6c9; }
    .inv-data-table { width: 100%; border-collapse: collapse; position: relative; z-index: 1; }
    .inv-data-table td { padding: clamp(7px,2vw,10px) clamp(4px,2vw,8px); font-size: clamp(12px,3.2vw,14px); border-bottom: 1px solid #efefef; vertical-align: middle; background: transparent; word-break: break-word; }
    .inv-data-table td:first-child { font-weight: 700; color: #111; width: 42%; padding-right: 8px; }
    .inv-data-table td:last-child { color: #333; }
    .inv-card-footer { border-top: 1px solid #efefef; padding: 10px 20px; text-align: center; font-size: clamp(11px,2.8vw,13px); color: #aaa; }

    .btn-download { display: none; width: 100%; background: var(--green); color: #fff; border: none; padding: 13px 20px; border-radius: 8px; font-size: clamp(13px,3.5vw,15px); font-family: inherit; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(27,110,46,0.22); transition: background 0.2s; margin-bottom: 4px; }
    .btn-download:hover { background: var(--green-dark); }
    .btn-download:disabled { background: #999; cursor: not-allowed; }
    .site-footer { text-align: center; font-size: clamp(11px,3vw,13px); color: var(--muted); padding: 10px 0; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="site-header">
    <img id="headerLogo" alt="Logo">
    <h1>Maa Narmada Yoga Bhopal</h1>
    <div class="inv-verif">Invoice Verification</div>
    <div class="contact"><span class="phone-icon">&#128222;</span><span>Contact: 7415602011</span></div>
  </div>
  <hr class="divider">
  <div class="form-card">
    <div class="verify-heading">Verify Invoice</div>
    <div class="form-row">
      <label for="invoiceNo">Invoice No:</label>
      <input type="text" id="invoiceNo" placeholder="e.g. INV-007" autocomplete="off">

    <div class="form-row">
      <label for="regNo">Registration No:</label>

    <button class="btn-verify" onclick="verifyInvoice()">&#128269; Verify Invoice</button>
    <div id="msg"></div>
    <select id="invoiceList"></select>
  </div>
  <div id="invoiceCard">
    <div class="inv-card-header">
      <img id="cardLogoEl" alt="Logo">
      <div class="company-name">Maa Narmada Yoga Bhopal</div>
    </div>
    <div class="inv-card-body">
      <img class="inv-watermark" id="cardWatermarkEl" alt="">
      <div class="inv-valid-label"><span style="font-size:17px;">&#9989;</span> Valid Invoice</div>
      <table class="inv-data-table" id="invoiceTable"></table>
    </div>
    <div class="inv-card-footer">Maa Narmada Yoga Bhopal &nbsp;&bull;&nbsp; Contact: 7415602011</div>
  </div>
  <button class="btn-download" id="downloadBtn" onclick="downloadInvoiceImage()">&#11015;&nbsp; Download Invoice (Image)</button>
  <hr class="divider-bottom">
  <div class="site-footer">Verified via Maa Narmada Yoga System</div>
</div>

  ["headerLogo","cardLogoEl","cardWatermarkEl"].forEach(function(id) {

    if (el) el.src = logoB64;

applyLogos();

var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiZDrK6niLdk44qCVSOR4g4vX54Rc6SYyVRwPoOk7e38B8BSoYGMbtBugxWCSgqTQPiw/exec";
var currentInvoice = {};
var invoiceDataList = [];
var jsonpTimer = null;

function verifyInvoice() {
  var inv = document.getElementById("invoiceNo").value.trim();
  var reg = document.getElementById("regNo").value.trim();
  var msg = document.getElementById("msg");
  msg.style.color = "#e65c00"; msg.innerText = "&#9203; Checking...";
  if (!inv && !reg) { msg.style.color="red"; msg.innerText="&#10060; Invoice No ya Registration No daalein"; return; }
  var old = document.getElementById("__jscript"); if (old) old.remove();
  if (jsonpTimer) clearTimeout(jsonpTimer);
  var cb = "jcb_" + Date.now();
  jsonpTimer = setTimeout(function() {
    msg.style.color="red"; msg.innerText="&#9888; Server se connect nahi ho paya!";
    delete window[cb]; var s=document.getElementById("__jscript"); if(s) s.remove();
  }, 10000);
  window[cb] = function(data) {
    clearTimeout(jsonpTimer); delete window[cb];
    var s=document.getElementById("__jscript"); if(s) s.remove();
    handleResponse(data);
  };
  var script = document.createElement("script");
  script.id = "__jscript";
  script.src = SCRIPT_URL + "?invoiceNo=" + encodeURIComponent(inv) + "&regNo=" + encodeURIComponent(reg) + "&callback=" + cb;
  script.onerror = function() { clearTimeout(jsonpTimer); delete window[cb]; msg.style.color="red"; msg.innerText="&#9888; Server se connect nahi ho paya!"; };
  document.body.appendChild(script);
}

function handleResponse(data) {
  var msg = document.getElementById("msg");
  if (!data || data.error) { msg.style.color="red"; msg.innerText="&#10060; Invoice not found!"; return; }
  if (Array.isArray(data)) {
    if (!data.length) { msg.style.color="red"; msg.innerText="&#10060; Invoice not found!"; return; }
    invoiceDataList = data;
    var list = document.getElementById("invoiceList");
    list.style.display = "block";
    list.innerHTML = "<option value=''>-- Invoice chunein --</option>";
    data.forEach(function(d,i) { list.innerHTML += "<option value='" + i + "'>" + d.invoiceNo + " | " + d.name + " | Rs." + d.amount + "</option>"; });
    list.onchange = function(e) { if (e.target.value !== "") showInvoice(invoiceDataList[+e.target.value]); };
    msg.style.color="#1565c0"; msg.innerText="Multiple invoices mili, ek chunein.";
    return;
  }
  showInvoice(data);
}

function safeBase64(str) {
  try { return btoa(unescape(encodeURIComponent(str))); }
  catch(e) { return btoa(String.fromCharCode.apply(null, new TextEncoder().encode(str))); }
}
function esc(v) {
  if (v==null) return "";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function formatDate(val) {
  if (!val) return "";
  try { var d=new Date(val); if(!isNaN(d)) return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear(); } catch(e) {}
  return val;
}
function buildRows(data) {
  var fields = [
    ["Invoice No", esc(data.invoiceNo)],
    ["Name", esc(data.name)],
    ["Registration No", esc(data.regNo)],
    ["Class Location", esc(data.location)],
    ["Service/Month", esc(data.service)],
    ["Amount", "&#8377;" + esc(data.amount)],
    ["Date", esc(formatDate(data.date))],
    ["Generated By Trainer", esc(data.trainer)]
  ];
  return fields.map(function(f) {
    return "<tr><td style=\"font-weight:700;color:#111;\">" + f[0] + "</td><td style=\"color:#333;\">" + f[1] + "</td></tr>";
  }).join("");
}
function showInvoice(data) {
  var msg = document.getElementById("msg");
  if (data.hash) {
    var exp = safeBase64(data.invoiceNo+"|"+data.name+"|"+data.regNo+"|"+data.location+"|"+data.amount+"|"+data.trainer);
    if (data.hash !== exp) { msg.style.color="red"; msg.innerText="&#9888; Invoice data tampered!"; return; }
  }
  currentInvoice = data;
  msg.innerText = "";
  document.getElementById("invoiceTable").innerHTML = buildRows(data);
  applyLogos();
  document.getElementById("invoiceCard").style.display = "block";
  document.getElementById("downloadBtn").style.display = "block";
  setTimeout(function() { document.getElementById("invoiceCard").scrollIntoView({behavior:"smooth",block:"start"}); }, 100);
}

function downloadInvoiceImage() {
  if (!currentInvoice.invoiceNo) { alert("Koi invoice nahi mila!"); return; }
  var btn = document.getElementById("downloadBtn");
  btn.disabled = true; btn.innerHTML = "&#9203; Image bana rahe hain...";
  var d = currentInvoice;
  var fields = [
    ["Invoice No", d.invoiceNo||""],
    ["Name", d.name||""],
    ["Registration No", d.regNo||""],
    ["Class Location", d.location||""],
    ["Service/Month", d.service||""],
    ["Amount", "\u20B9"+(d.amount||"")],
    ["Date", formatDate(d.date)],
    ["Generated By Trainer", d.trainer||""]
  ];
  function rRect(ctx,x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }
  function drawInvoice(logoImg) {
    var W=600, PAD=30, ROW_H=42, HDR_H=155;
    var BODY_H = 58 + fields.length*ROW_H + 20;
    var FTR_H=48, H=HDR_H+BODY_H+FTR_H, SC=2.5;
    var canvas=document.createElement("canvas");
    canvas.width=W*SC; canvas.height=H*SC;
    var ctx=canvas.getContext("2d");
    ctx.scale(SC,SC);
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
    rRect(ctx,1,1,W-2,H-2,8); ctx.strokeStyle="#bbbbbb"; ctx.lineWidth=1.5; ctx.stroke();
    var LS=88, LX=(W-LS)/2, LY=16;
    if (logoImg) {
      ctx.save(); ctx.beginPath();
      ctx.arc(LX+LS/2,LY+LS/2,LS/2,0,Math.PI*2); ctx.clip();
      ctx.drawImage(logoImg,LX,LY,LS,LS); ctx.restore();
      ctx.beginPath(); ctx.arc(LX+LS/2,LY+LS/2,LS/2,0,Math.PI*2);
      ctx.strokeStyle="#1b6e2e"; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.font="bold 20px Segoe UI, Arial"; ctx.fillStyle="#111"; ctx.textAlign="center";
    ctx.fillText("Maa Narmada Yoga Bhopal",W/2,LY+LS+22);
    var HD=LY+LS+40;
    ctx.beginPath(); ctx.moveTo(PAD,HD); ctx.lineTo(W-PAD,HD);
    ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1; ctx.stroke();
    var BT=HD+2;
    if (logoImg) {
      var WS=280, WCX=W/2, WCY=BT+BODY_H/2;
      ctx.save(); ctx.globalAlpha=0.10; ctx.beginPath();
      ctx.arc(WCX,WCY,WS/2,0,Math.PI*2); ctx.clip();
      ctx.drawImage(logoImg,WCX-WS/2,WCY-WS/2,WS,WS); ctx.restore();
    }
    ctx.globalAlpha=1;
    ctx.font="bold 14px Segoe UI, Arial"; ctx.fillStyle="#2e7d32"; ctx.textAlign="left";
    ctx.fillText("\u2705  Valid Invoice",PAD,BT+36);
    var rowY=BT+54;
    fields.forEach(function(fl) {
      ctx.beginPath(); ctx.moveTo(PAD,rowY); ctx.lineTo(W-PAD,rowY);
      ctx.strokeStyle="#eeeeee"; ctx.lineWidth=1; ctx.stroke();
      ctx.font="bold 13.5px Segoe UI, Arial"; ctx.fillStyle="#111"; ctx.textAlign="left";
      ctx.fillText(fl[0],PAD,rowY+ROW_H*0.62);
      ctx.font="13.5px Segoe UI, Arial"; ctx.fillStyle="#333";
      ctx.fillText(String(fl[1]),W*0.45,rowY+ROW_H*0.62);
      rowY+=ROW_H;
    });
    ctx.beginPath(); ctx.moveTo(PAD,rowY); ctx.lineTo(W-PAD,rowY);
    ctx.strokeStyle="#eeeeee"; ctx.lineWidth=1; ctx.stroke();
    var FT=H-FTR_H;
    ctx.beginPath(); ctx.moveTo(PAD,FT); ctx.lineTo(W-PAD,FT);
    ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1; ctx.stroke();
    ctx.font="12px Segoe UI, Arial"; ctx.fillStyle="#aaa"; ctx.textAlign="center";
    ctx.fillText("Maa Narmada Yoga Bhopal  \u2022  Contact: 7415602011",W/2,FT+30);
    var link=document.createElement("a");
    link.download=(d.invoiceNo||"invoice")+"-invoice.png";
    link.href=canvas.toDataURL("image/png");
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    btn.disabled=false; btn.innerHTML="&#11015;&nbsp; Download Invoice (Image)";
  }
  var img=new Image();
  img.onload = function() { drawInvoice(img); };
  img.onerror = function() { drawInvoice(null); };
  img.src = logoB64;
}
</script>
