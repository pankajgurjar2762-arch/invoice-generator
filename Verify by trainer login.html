  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header img {
      width: 80px; height: 80px;
      border-radius: 50%; object-fit: cover;
      display: block; margin: 0 auto 10px;
    }
    .header h2 { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #555; }
    h3 { font-size: 15px; font-weight: bold; margin: 18px 0 8px; }
    .form-row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .form-row label { font-size: 14px; white-space: nowrap; }
    input[type=text] {
      padding: 5px 8px; border: 1px solid #999;
      border-radius: 3px; font-size: 14px; width: 180px;
    }
    .btn {
      padding: 6px 14px; font-size: 13px;
      border: 1px solid #555; background: #fff;
      cursor: pointer; border-radius: 3px;
    }
    .btn:hover { background: #f0f0f0; }
    #reader { width: 300px; margin-top: 8px; border: 1px solid #ccc; }
    #result { margin-top: 18px; }
    .result-box {
      border: 1.5px solid #333;
      padding: 18px; background: #fff;
      position: relative; overflow: hidden;
    }
    .result-box .wm {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 180px; height: 180px;
      object-fit: contain;
      opacity: 0.13;
      pointer-events: none;
      z-index: 0;
    }
    .zz { position: relative; z-index: 1; }
    .res-header { text-align: center; margin-bottom: 10px; }
    .res-header img {
      width: 50px; height: 50px;
      border-radius: 50%; object-fit: cover;
      display: block; margin: 0 auto 6px;
    }
    .res-header h3 { font-size: 15px; margin: 0; }
    .valid-tag { color: green; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
    .result-box table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .result-box table td { padding: 6px 4px; border-bottom: 1px solid #eee; vertical-align: top; }
    .result-box table td:first-child { font-weight: bold; width: 45%; }
    .result-footer {
      text-align: center; font-size: 11px; color: #888;
      margin-top: 12px; border-top: 1px solid #ddd; padding-top: 8px;
    }
    #downloadBtn {
      display: none; margin-top: 12px;
      padding: 8px 16px; font-size: 14px;
      background: #2d6a4f; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #downloadBtn:hover { background: #245a41; }
    .divider { border: none; border-top: 1.5px solid #333; margin: 24px 0 10px; }
    .footer { text-align: center; font-size: 12px; color: #444; padding-bottom: 20px; }
    @media (max-width: 500px) {
      input[type=text] { width: 100%; }
      .form-row { flex-direction: column; align-items: flex-start; }
      #reader { width: 100%; }
    }
  </style>

  let currentRecord = null;

  /* Draw watermark on page background */
  function drawPageWatermark() {
    const cvs = document.getElementById("bgCanvas");
    cvs.width  = window.innerWidth;
    cvs.height = window.innerHeight;
    const ctx  = cvs.getContext("2d");
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    const img = new Image();
    img.onload = () => {
      const size = Math.min(cvs.width, cvs.height) * 0.42;
      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.drawImage(img, cvs.width/2 - size/2, cvs.height/2 - size/2, size, size);
      ctx.restore();
    };
    img.src = LOGO_DATA_URL;
  }

  window.addEventListener("resize", drawPageWatermark);
  window.addEventListener("DOMContentLoaded", drawPageWatermark);

  /* VERIFY LOGIC */
  function showValid(record) {
    currentRecord = record;
    document.getElementById("result").innerHTML = `
      <div class="result-box">
        <img class="wm" src="${LOGO_DATA_URL}" alt="">
        <div class="zz res-header">
          <img src="${LOGO_DATA_URL}" alt="Logo">
          <h3>Maa Narmada Yoga Bhopal</h3>
        </div>
        <div class="zz valid-tag">✅ Valid Invoice</div>
        <table class="zz">
          <tr><td>Invoice No</td><td>${record.invoiceNo}</td></tr>
          <tr><td>Name</td><td>${record.name}</td></tr>
          <tr><td>Registration No</td><td>${record.regNo}</td></tr>
          <tr><td>Class Location</td><td>${record.location}</td></tr>
          <tr><td>Service/Month</td><td>${record.service}</td></tr>
          <tr><td>Amount</td><td>&#8377;${record.amount}</td></tr>
          <tr><td>Date</td><td>${record.date}</td></tr>
          <tr><td>Generated By Trainer</td><td>${record.trainer}</td></tr>
        </table>
        <div class="zz result-footer">Maa Narmada Yoga Bhopal • Contact: 7415602011</div>
      </div>`;
    document.getElementById("downloadBtn").style.display = "inline-block";
  }

  function showInvalid(reason) {
    currentRecord = null;
    document.getElementById("result").innerHTML =
      `<h3 style="color:red;margin-top:16px;">❌ Invalid Invoice (${reason})</h3>`;
    document.getElementById("downloadBtn").style.display = "none";
  }

  function verifyRecord(invoiceNo) {
    const data = localStorage.getItem(invoiceNo);
    if (data) {
      try {
        const r = JSON.parse(data);
        const expected = btoa(r.invoiceNo+"|"+r.name.trim()+"|"+r.regNo.trim()+"|"+r.location.trim()+"|"+r.amount+"|"+r.trainer);
        r.hash === expected ? showValid(r) : showInvalid("Hash mismatch");
      } catch(e) { showInvalid("Data corrupt"); }
    } else { showInvalid("Not found"); }
  }

  function verifyInvoice() { verifyRecord(document.getElementById("invoiceNo").value.trim()); }

  function verifyByReg() {
    const regNo = document.getElementById("regNo").value.trim();
    let found = false;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith("INV-")) {
        try {
          const r = JSON.parse(localStorage.getItem(key));
          if (r && r.regNo && r.regNo.trim() === regNo) {
            found = true;
            const expected = btoa(r.invoiceNo+"|"+r.name.trim()+"|"+r.regNo.trim()+"|"+r.location.trim()+"|"+r.amount+"|"+r.trainer);
            r.hash === expected ? showValid(r) : showInvalid("Hash mismatch");
            break;
          }
        } catch(e) {}
      }
    }
    if (!found) showInvalid("Registration No not found");
  }

  function onScanSuccess(t) { verifyRecord(t.split("|")[0].trim()); }
  try {
    new Html5Qrcode("reader").start({facingMode:"environment"},{fps:10,qrbox:220},onScanSuccess).catch(()=>{});
  } catch(e) {}

  /* DOWNLOAD */
  function downloadInvoice() {
    if (!currentRecord) { alert("पहले कोई valid invoice verify करें!"); return; }
    const r = currentRecord;
    const W = 580, PAD = 30, ROW_H = 38;
    const rows = [
      ["Invoice No", r.invoiceNo], ["Name", r.name],
      ["Registration No", r.regNo], ["Class Location", r.location],
      ["Service/Month", r.service], ["Amount", "Rs. " + r.amount],
      ["Date", r.date], ["Generated By Trainer", r.trainer],
    ];
    const LOGO_H = 60, TOTAL_H = 30 + LOGO_H + 80 + 36 + rows.length * ROW_H + 50 + 30;
    const DPR = 2;
    const cvs = document.createElement("canvas");
    cvs.width = W * DPR; cvs.height = TOTAL_H * DPR;
    const ctx = cvs.getContext("2d");
    ctx.scale(DPR, DPR);

    const logoImg = new Image();
    logoImg.onload = () => paint(logoImg);
    logoImg.onerror = () => paint(null);
    logoImg.src = LOGO_DATA_URL;

    function paint(logo) {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, TOTAL_H);

      /* Watermark */
      if (logo) {
        ctx.save(); ctx.globalAlpha = 0.13;
        const wSize = 220;
        ctx.drawImage(logo, W/2 - wSize/2, TOTAL_H/2 - wSize/2, wSize, wSize);
        ctx.restore();
      }

      let Y = 20;
      ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5;
      ctx.strokeRect(PAD, Y, W-PAD*2, TOTAL_H-Y-20);
      Y += 18;

      /* Circular logo in header */
      if (logo) {
        const lR = 26;
        ctx.save();
        ctx.beginPath();
        ctx.arc(W/2, Y + lR, lR, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(logo, W/2 - lR, Y, lR*2, lR*2);
        ctx.restore();
        Y += lR*2 + 8;
      }

      /* Header text */
      ctx.textAlign = "center";
      ctx.fillStyle = "#111"; ctx.font = "bold 17px Arial";
      ctx.fillText("Maa Narmada Yoga Bhopal", W/2, Y+20);
      ctx.font = "12px Arial"; ctx.fillStyle = "#555";
      ctx.fillText("Contact: 7415602011", W/2, Y+38);
      ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PAD+10,Y+50); ctx.lineTo(W-PAD-10,Y+50); ctx.stroke();
      Y += 62;

      /* Valid */
      ctx.textAlign = "left"; ctx.font = "bold 14px Arial"; ctx.fillStyle = "green";
      ctx.fillText("✅ Valid Invoice", PAD+14, Y+24);
      Y += 36;

      /* Rows */
      rows.forEach(([label, val], i) => {
        ctx.fillStyle = i%2===0 ? "#f9f9f9" : "#fff";
        ctx.fillRect(PAD+1, Y, W-PAD*2-2, ROW_H);
        ctx.strokeStyle = "#eee"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(PAD+10,Y+ROW_H); ctx.lineTo(W-PAD-10,Y+ROW_H); ctx.stroke();
        ctx.font = "bold 13px Arial"; ctx.fillStyle = "#222"; ctx.textAlign = "left";
        ctx.fillText(label, PAD+14, Y+ROW_H/2+5);
        ctx.font = label==="Amount" ? "bold 14px Arial" : "13px Arial";
        ctx.fillStyle = label==="Amount" ? "#2d6a4f" : "#111";
        ctx.textAlign = "right";
        ctx.fillText(String(val), W-PAD-14, Y+ROW_H/2+5);
        Y += ROW_H;
      });

      Y += 10;
      ctx.strokeStyle = "#ddd"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PAD+10,Y); ctx.lineTo(W-PAD-10,Y); ctx.stroke();
      ctx.font = "11px Arial"; ctx.fillStyle = "#888"; ctx.textAlign = "center";
      ctx.fillText("Maa Narmada Yoga Bhopal  •  Contact: 7415602011", W/2, Y+24);

      const link = document.createElement("a");
      link.download = r.invoiceNo + "_invoice.png";
      link.href = cvs.toDataURL("image/png");
      link.click();
    }
  }
