<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maa Narmada Yoga - Verify Invoice</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .page {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      border: 1px solid #333;
      background: #fff;
    }
    .header { text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    .header img { width:80px; }
    .header p { margin: 5px 0; }
    .footer { text-align:center; border-top: 2px solid #333; margin-top: 20px; padding-top: 10px; font-size: 12px; }
    .btn { margin-top: 10px; padding: 8px 12px; }
    .invoice-list { margin-top: 20px; }
    .invoice-item { border:1px solid #666; padding:10px; margin-bottom:10px; }
    .invoice-item table { width:100%; border-collapse: collapse; }
    .invoice-item td { padding: 6px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <img src="logo.png" alt="Maa Narmada Yoga Logo">
      <h2>Maa Narmada Yoga Bhopal</h2>
      <p><strong>Invoice Verification</strong></p>
      <p>📞 Contact: 7415602011</p>
    </div>

    <!-- Verification Section -->
    <div id="verifySection">
      <h3>Verify Invoice by Registration Number</h3>
      <label>Enter Registration No:</label> 
      <input type="text" id="verifyRegNo" required>
      <button onclick="verifyInvoice()" class="btn">Verify</button>
      <p id="verifyMsg" style="color:red;"></p>
    </div>

    <!-- Dropdown for months -->
    <div id="monthSelectDiv" style="display:none; margin-top:15px;">
      <label>Select Month-Year:</label>
      <select id="monthDropdown" onchange="showInvoice()"></select>
    </div>

    <!-- Output Section -->
    <div id="invoiceList" class="invoice-list"></div>

    <div class="footer">
      <p>Thank you for choosing Maa Narmada Yoga Bhopal</p>
      <p>📞 For queries call: 7415602011</p>
    </div>
  </div>

  <script>
    let foundInvoices = [];

    function verifyInvoice(){
      let regNo = document.getElementById("verifyRegNo").value.trim();
      if(!regNo){
        document.getElementById("verifyMsg").innerText = "❌ Please enter Registration Number";
        return;
      }
      document.getElementById("verifyMsg").innerText = "";

      foundInvoices = [];
      for(let i=0; i<localStorage.length; i++){
        let key = localStorage.key(i);
        if(key.includes(regNo)){ 
          let data = JSON.parse(localStorage.getItem(key));
          if(data.regNo === regNo){
            foundInvoices.push(data);
          }
        }
      }

      if(foundInvoices.length === 0){
        document.getElementById("invoiceList").innerHTML = "<p style='color:red;'>❌ No invoices found for this Registration Number</p>";
        document.getElementById("monthSelectDiv").style.display = "none";
        return;
      }

      // Sort by date (latest first)
      foundInvoices.sort((a,b) => new Date(b.date) - new Date(a.date));

      // Populate dropdown
      let dropdown = document.getElementById("monthDropdown");
      dropdown.innerHTML = "";
      foundInvoices.forEach(inv => {
        let opt = document.createElement("option");
        opt.value = inv.invoiceNo;
        opt.text = inv.service + " (" + inv.date + ")";
        dropdown.appendChild(opt);
      });

      document.getElementById("monthSelectDiv").style.display = "block";
      showInvoice(); // show latest by default
    }

    function showInvoice(){
      let selectedInvoiceNo = document.getElementById("monthDropdown").value;
      let inv = foundInvoices.find(i => i.invoiceNo === selectedInvoiceNo);

      if(!inv) return;

      let output = `
        <div class="invoice-item">
          <table>
            <tr><td><strong>Invoice No:</strong></td><td>${inv.invoiceNo}</td></tr>
            <tr><td><strong>Date:</strong></td><td>${inv.date}</td></tr>
            <tr><td><strong>Name:</strong></td><td>${inv.name}</td></tr>
            <tr><td><strong>Registration No:</strong></td><td>${inv.regNo}</td></tr>
            <tr><td><strong>Class Location:</strong></td><td>${inv.location}</td></tr>
            <tr><td><strong>Service/Month:</strong></td><td>${inv.service}</td></tr>
            <tr><td><strong>Amount:</strong></td><td>₹${inv.amount}</td></tr>
            <tr><td><strong>Generated By:</strong></td><td>${inv.trainer}</td></tr>
            <tr><td><strong>Hash:</strong></td><td>${inv.hash}</td></tr>
          </table>
        </div>
      `;
      document.getElementById("invoiceList").innerHTML = output;
    }
  </script>
</body>
</html>
