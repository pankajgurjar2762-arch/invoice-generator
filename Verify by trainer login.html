<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Invoice - Maa Narmada Yoga</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .header { text-align:center; margin-bottom:20px; }
    .header img { width:80px; }
    .header p { margin: 5px 0; }
    .valid::after {
      content: "";
      position: fixed;
      top: 30%;
      left: 25%;
      width: 400px;
      height: 400px;
      background: url('logo.png') no-repeat center center;
      background-size: contain;
      opacity: 0.15;
      transform: rotate(-20deg);
      pointer-events: none;
    }
    .result { margin-top: 20px; padding: 15px; border: 2px solid #333; width: 400px; }
    #reader { margin-top: 20px; }
    .footer { text-align:center; border-top: 2px solid #333; margin-top: 20px; padding-top: 10px; font-size: 12px; }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Maa Narmada Yoga Logo">
    <h2>Maa Narmada Yoga Bhopal</h2>
    <p>📞 Contact: 7415602011</p>
  </div>

  <h3>Verify Invoice</h3>
  Enter Invoice Number: <input type="text" id="invoiceNo" required>
  <button onclick="verifyInvoice()">Verify</button>

  <h3>Or Scan QR Code</h3>
  <div id="reader" style="width:300px;"></div>

  <div id="result"></div>

  <div class="footer">
    <p>Thank you for choosing Maa Narmada Yoga Bhopal</p>
    <p>📞 For queries call: 7415602011</p>
  </div>

  <script>
    function showValid(record){
      document.body.classList.add("valid");
      document.getElementById("result").innerHTML = `
        <div class="result">
          <div style="text-align:center;">
            <img src="logo.png" alt="Maa Narmada Yoga Logo" width="60">
            <h3>Maa Narmada Yoga Bhopal</h3>
          </div>
          <h3>✅ Valid Invoice</h3>
          <p>Invoice No: ${record.invoiceNo}</p>
          <p>Name: ${record.name}</p>
          <p>Registration No: ${record.regNo}</p>
          <p>Class Location: ${record.location}</p>
          <p>Service/Month: ${record.service}</p>
          <p>Amount: ₹${record.amount}</p>
          <p>Date: ${record.date}</p>
          <p><strong>Generated By Trainer:</strong> ${record.trainer}</p>
        </div>
      `;
    }

    function showInvalid(reason){
      document.body.classList.remove("valid");
      document.getElementById("result").innerHTML = `<h3>❌ Invalid Invoice (${reason})</h3>`;
    }

    function verifyRecord(invoiceNo){
      let data = localStorage.getItem(invoiceNo);
      if(data){
        let record = JSON.parse(data);
        // Same hash formula as generator
        let expectedHash = btoa(record.invoiceNo + "|" + record.name.trim() + "|" + record.regNo.trim() + "|" + record.location.trim() + "|" + record.amount + "|" + record.trainer);
        if(record.hash === expectedHash){
          showValid(record);
        } else {
          showInvalid("Hash mismatch");
        }
      } else {
        showInvalid("Not found");
      }
    }

    function verifyInvoice(){
      let invoiceNo = document.getElementById("invoiceNo").value.trim();
      verifyRecord(invoiceNo);
    }

    function onScanSuccess(decodedText, decodedResult) {
      // QR Code contains invoiceNo|amount|hash
      let parts = decodedText.split("|");
      let invoiceNo = parts[0].trim();
      verifyRecord(invoiceNo);
    }

    let html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  </script>
</body>
</html>
