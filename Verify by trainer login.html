<script>
  function showValid(record){
    document.body.classList.add("valid");
    document.getElementById("result").innerHTML = `
      <div class="result">
        <div style="text-align:center;">
          <img src="logo.png" alt="Maa Narmada Yoga Logo" width="60">
          <h3>Maa Narmada Yoga Bhopal</h3>
        </div>
        <h3>✅ Valid Invoice</h3>
        <p>Invoice No: ${record.invoiceNo}</p>
        <p>Name: ${record.name}</p>
        <p>Registration No: ${record.regNo}</p>
        <p>Class Location: ${record.location}</p>
        <p>Service/Month: ${record.service}</p>
        <p>Amount: ₹${record.amount}</p>
        <p>Date: ${record.date}</p>
        <p><strong>Generated By Trainer:</strong> ${record.trainer}</p>
      </div>
    `;
  }

  function showInvalid(reason){
    document.body.classList.remove("valid");
    document.getElementById("result").innerHTML = `<h3>❌ Invalid Invoice (${reason})</h3>`;
  }

  // अब यह function InvoiceNo OR RegistrationNo दोनों से verify करेगा
  function verifyRecord(inputValue){
    let data = localStorage.getItem(inputValue);
    if(data){
      let record = JSON.parse(data);
      let expectedHash = btoa(
        record.invoiceNo + "|" + record.name.trim() + "|" + record.regNo.trim() + "|" + record.location.trim() + "|" + record.amount + "|" + record.trainer
      );
      if(record.hash === expectedHash){
        showValid(record);
      } else {
        showInvalid("Hash mismatch");
      }
    } else {
      showInvalid("Not found");
    }
  }

  // Manual Verification
  function verifyInvoice(){
    let inputValue = document.getElementById("invoiceNo").value.trim();
    verifyRecord(inputValue);
  }

  // QR Code Verification
  function onScanSuccess(decodedText, decodedResult) {
    let parts = decodedText.split("|");
    let inputValue = parts[0].trim(); // QR में पहला हिस्सा InvoiceNo या RegNo हो सकता है
    verifyRecord(inputValue);
  }

  let html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" }, 
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );

  function printInvoice(){
    window.print();
  }
</script>
