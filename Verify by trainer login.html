<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maa Narmada Yoga - Verify Invoice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1b6e2e;
      --green-dark: #145a25;
      --green-light: #e8f5e9;
      --border: #d0d0d0;
      --text: #111;
      --muted: #555;
      --pink: #e91e63;
      --card-bg: #fff;
      --bg: #f5f5f5;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── WRAPPER ── */
    .wrapper {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      padding: 28px 0 20px;
    }
    .site-header img#headerLogo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 3px solid var(--green);
      box-shadow: 0 2px 12px rgba(27,110,46,0.18);
    }
    .site-header h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .inv-verif {
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .contact {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .contact .phone-icon { color: var(--pink); font-size: 16px; }

    /* ── DIVIDER ── */
    .divider, .divider-bottom {
      border: none;
      border-top: 2px solid #ccc;
      margin: 16px 0 22px;
    }
    .divider-bottom { margin: 28px 0 14px; }

    /* ── VERIFY FORM CARD ── */
    .form-card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: clamp(18px, 5vw, 32px);
      margin-bottom: 20px;
    }
    .verify-heading {
      font-size: clamp(15px, 4vw, 19px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .verify-heading::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--green);
      border-radius: 2px;
    }

    /* ── FORM ROWS ── */
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .form-row label {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 600;
      color: var(--text);
      min-width: 140px;
      flex-shrink: 0;
    }
    .form-row input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      font-size: clamp(13px, 3.5vw, 15px);
      font-family: inherit;
      border-radius: 8px;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .form-row input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(27,110,46,0.12);
      background: #fff;
    }

    /* Mobile: stack label above input */
    @media (max-width: 480px) {
      .form-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      .form-row label {
        min-width: unset;
        width: 100%;
      }
      .form-row input {
        width: 100%;
      }
    }

    /* ── BUTTON ── */
    .btn-verify {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 24px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: clamp(13px, 3.5vw, 15px);
      font-family: inherit;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      box-shadow: 0 2px 8px rgba(27,110,46,0.22);
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }
    .btn-verify:hover { background: var(--green-dark); }
    .btn-verify:active { transform: scale(0.98); }

    /* ── MESSAGE ── */
    #msg {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 600;
      min-height: 22px;
      margin: 12px 0 6px;
      text-align: center;
    }

    /* ── INVOICE LIST SELECT ── */
    #invoiceList {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      font-size: clamp(13px, 3.5vw, 14px);
      font-family: inherit;
      width: 100%;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
    }

    /* ── INVOICE CARD ── */
    #invoiceCard {
      display: none;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .inv-card-header {
      text-align: center;
      padding: clamp(16px, 4vw, 24px) 20px clamp(12px, 3vw, 16px);
      border-bottom: 1px solid #e8e8e8;
      background: linear-gradient(135deg, #f9fff9 0%, #fff 100%);
    }
    .inv-card-header img {
      width: clamp(58px, 14vw, 72px);
      height: clamp(58px, 14vw, 72px);
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 10px;
      border: 2px solid var(--green);
    }
    .inv-card-header .company-name {
      font-size: clamp(15px, 4vw, 19px);
      font-weight: 700;
      color: var(--text);
    }

    .inv-card-body {
      padding: clamp(14px, 4vw, 20px) clamp(14px, 4vw, 24px) 10px;
      position: relative;
      overflow: hidden;
    }
    .inv-watermark {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(180px, 45vw, 280px);
      height: clamp(180px, 45vw, 280px);
      object-fit: contain;
      border-radius: 50%;
      opacity: 0.10;
      pointer-events: none;
      z-index: 0;
    }

    .inv-valid-label {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-light);
      padding: 7px 12px;
      border-radius: 7px;
      border: 1px solid #c8e6c9;
    }

    /* ── TABLE ── */
    .inv-data-table {
      width: 100%;
      border-collapse: collapse;
      position: relative;
      z-index: 1;
    }
    .inv-data-table td {
      padding: clamp(7px, 2vw, 10px) clamp(4px, 2vw, 8px);
      font-size: clamp(12px, 3.2vw, 14px);
      border-bottom: 1px solid #efefef;
      vertical-align: middle;
      background: transparent;
      word-break: break-word;
    }
    .inv-data-table td:first-child {
      font-weight: 700;
      color: #111;
      width: 42%;
      padding-right: 8px;
      white-space: nowrap;
    }
    .inv-data-table td:last-child {
      color: #333;
    }

    /* Mobile: make table rows stack nicely */
    @media (max-width: 420px) {
      .inv-data-table td:first-child {
        width: 44%;
        font-size: 12px;
      }
      .inv-data-table td:last-child {
        font-size: 12px;
      }
    }

    .inv-card-footer {
      border-top: 1px solid #efefef;
      padding: 10px 20px;
      text-align: center;
      font-size: clamp(11px, 2.8vw, 13px);
      color: #aaa;
    }

    /* ── DOWNLOAD BUTTON ── */
    .btn-download {
      display: none;
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 13px 20px;
      border-radius: 8px;
      font-size: clamp(13px, 3.5vw, 15px);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.12s;
      box-shadow: 0 2px 8px rgba(27,110,46,0.22);
      margin-bottom: 4px;
    }
    .btn-download:hover { background: var(--green-dark); }
    .btn-download:active { transform: scale(0.98); }
    .btn-download:disabled { background: #999; cursor: not-allowed; }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      font-size: clamp(11px, 3vw, 13px);
      color: var(--muted);
      padding: 10px 0;
    }
  </style>
</head>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiZDrK6niLdk44qCVSOR4g4vX54Rc6SYyVRwPoOk7e38B8BSoYGMbtBugxWCSgqTQPiw/exec";
let currentInvoice = {};
let invoiceDataList = [];
let jsonpTimer = null;

function verifyInvoice() {
  const inv = document.getElementById("invoiceNo").value.trim();
  const reg = document.getElementById("regNo").value.trim();
  const msg = document.getElementById("msg");
  msg.style.color = "#e65c00"; msg.innerText = "⏳ Checking...";
  if (!inv && !reg) { msg.style.color="red"; msg.innerText="❌ Invoice No या Registration No डालें"; return; }
  const old = document.getElementById("__jscript"); if (old) old.remove();
  if (jsonpTimer) clearTimeout(jsonpTimer);
  const cb = "jcb_" + Date.now();
  jsonpTimer = setTimeout(() => {
    msg.style.color="red"; msg.innerText="⚠️ Server से connect नहीं हो पाया!";
    delete window[cb]; const s=document.getElementById("__jscript"); if(s) s.remove();
  }, 10000);
  window[cb] = data => {
    clearTimeout(jsonpTimer); delete window[cb];
    const s=document.getElementById("__jscript"); if(s) s.remove();
    handleResponse(data);
  };
  const script = document.createElement("script");
  script.id = "__jscript";
  script.src = `${SCRIPT_URL}?invoiceNo=${encodeURIComponent(inv)}&regNo=${encodeURIComponent(reg)}&callback=${cb}`;
  script.onerror = () => { clearTimeout(jsonpTimer); delete window[cb]; msg.style.color="red"; msg.innerText="⚠️ Server से connect नहीं हो पाया!"; };
  document.body.appendChild(script);
}

function handleResponse(data) {
  const msg = document.getElementById("msg");
  if (!data || data.error) { msg.style.color="red"; msg.innerText="❌ Invoice not found!"; return; }
  if (Array.isArray(data)) {
    if (!data.length) { msg.style.color="red"; msg.innerText="❌ Invoice not found!"; return; }
    invoiceDataList = data;
    const list = document.getElementById("invoiceList");
    list.style.display = "block";
    list.innerHTML = "<option value=''>-- Invoice चुनें --</option>";
    data.forEach((d,i) => list.innerHTML += `<option value="${i}">${d.invoiceNo} | ${d.name} | ₹${d.amount}</option>`);
    list.onchange = e => { if (e.target.value !== "") showInvoice(invoiceDataList[+e.target.value]); };
    msg.style.color="#1565c0"; msg.innerText="ℹ️ Multiple invoices मिलीं, एक चुनें।";
    return;
  }
  showInvoice(data);
}

function safeBase64(str) {
  try { return btoa(unescape(encodeURIComponent(str))); }
  catch(e) { return btoa(String.fromCharCode(...new TextEncoder().encode(str))); }
}
function esc(v) {
  if (v==null) return "";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function formatDate(val) {
  if (!val) return "";
  try { const d=new Date(val); if(!isNaN(d)) return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; } catch(e) {}
  return val;
}
function buildRows(data) {
  const fields = [
    ["Invoice No", esc(data.invoiceNo)],
    ["Name", esc(data.name)],
    ["Registration No", esc(data.regNo)],
    ["Class Location", esc(data.location)],
    ["Service/Month", esc(data.service)],
    ["Amount", "&#8377;" + esc(data.amount)],
    ["Date", esc(formatDate(data.date))],
    ["Generated By Trainer", esc(data.trainer)],
  ];
  return fields.map(([label,val]) => `
    <tr>
      <td style="font-weight:700;color:#111;">${label}</td>
      <td style="color:#333;">${val}</td>
    </tr>`).join("");
}
function showInvoice(data) {
  const msg = document.getElementById("msg");
  if (data.hash) {
    const exp = safeBase64(data.invoiceNo+"|"+data.name+"|"+data.regNo+"|"+data.location+"|"+data.amount+"|"+data.trainer);
    if (data.hash !== exp) { msg.style.color="red"; msg.innerText="⚠️ Invoice data tampered!"; return; }
  }
  currentInvoice = data;
  msg.innerText = "";
  document.getElementById("invoiceTable").innerHTML = buildRows(data);
  applyLogos();
  document.getElementById("invoiceCard").style.display = "block";
  document.getElementById("downloadBtn").style.display = "block";
  setTimeout(() => document.getElementById("invoiceCard").scrollIntoView({behavior:"smooth",block:"start"}), 100);
}

/* ══ DOWNLOAD ══ */
function downloadInvoiceImage() {
  if (!currentInvoice.invoiceNo) { alert("❌ कोई invoice नहीं मिला!"); return; }
  const btn = document.getElementById("downloadBtn");
  btn.disabled = true; btn.innerHTML = "⏳ Image बना रहे हैं...";

  const d = currentInvoice;
  const fields = [
    ["Invoice No", d.invoiceNo||""],
    ["Name", d.name||""],
    ["Registration No", d.regNo||""],
    ["Class Location", d.location||""],
    ["Service/Month", d.service||""],
    ["Amount", "\u20B9"+(d.amount||"")],
    ["Date", formatDate(d.date)],
    ["Generated By Trainer", d.trainer||""],
  ];

  function rRect(ctx,x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function drawInvoice(logoImg) {
    const W=600, PAD=30, ROW_H=42, HDR_H=150;
    const BODY_H = 58 + fields.length*ROW_H + 20;
    const FTR_H=48, H=HDR_H+BODY_H+FTR_H, SC=2.5;
    const canvas=document.createElement("canvas");
    canvas.width=W*SC; canvas.height=H*SC;
    const ctx=canvas.getContext("2d");
    ctx.scale(SC,SC);
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
    rRect(ctx,1,1,W-2,H-2,8); ctx.strokeStyle="#bbbbbb"; ctx.lineWidth=1.5; ctx.stroke();
    const LS=82, LX=(W-LS)/2, LY=18;
    if (logoImg) {
      ctx.save(); ctx.beginPath();
      ctx.arc(LX+LS/2,LY+LS/2,LS/2,0,Math.PI*2); ctx.clip();
      ctx.drawImage(logoImg,LX,LY,LS,LS); ctx.restore();
      ctx.beginPath(); ctx.arc(LX+LS/2,LY+LS/2,LS/2,0,Math.PI*2);
      ctx.strokeStyle="#cccccc"; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.font="bold 20px Arial"; ctx.fillStyle="#111"; ctx.textAlign="center";
    ctx.fillText("Maa Narmada Yoga Bhopal",W/2,LY+LS+22);
    const HD=LY+LS+40;
    ctx.beginPath(); ctx.moveTo(PAD,HD); ctx.lineTo(W-PAD,HD);
    ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1; ctx.stroke();
    const BT=HD+2;
    if (logoImg) {
      const WS=290, WCX=W/2, WCY=BT+BODY_H/2;
      ctx.save(); ctx.globalAlpha=0.12; ctx.beginPath();
      ctx.arc(WCX,WCY,WS/2,0,Math.PI*2); ctx.clip();
      ctx.drawImage(logoImg,WCX-WS/2,WCY-WS/2,WS,WS); ctx.restore();
    }
    ctx.globalAlpha=1;
    ctx.font="bold 14px Arial"; ctx.fillStyle="#2e7d32"; ctx.textAlign="left";
    ctx.fillText("\u2705  Valid Invoice",PAD,BT+36);
    let rowY=BT+54;
    fields.forEach(([label,val]) => {
      ctx.beginPath(); ctx.moveTo(PAD,rowY); ctx.lineTo(W-PAD,rowY);
      ctx.strokeStyle="#eeeeee"; ctx.lineWidth=1; ctx.stroke();
      ctx.font="bold 13.5px Arial"; ctx.fillStyle="#111"; ctx.textAlign="left";
      ctx.fillText(label,PAD,rowY+ROW_H*0.62);
      ctx.font="13.5px Arial"; ctx.fillStyle="#333";
      ctx.fillText(String(val),W*0.45,rowY+ROW_H*0.62);
      rowY+=ROW_H;
    });
    ctx.beginPath(); ctx.moveTo(PAD,rowY); ctx.lineTo(W-PAD,rowY);
    ctx.strokeStyle="#eeeeee"; ctx.lineWidth=1; ctx.stroke();
    const FT=H-FTR_H;
    ctx.beginPath(); ctx.moveTo(PAD,FT); ctx.lineTo(W-PAD,FT);
    ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1; ctx.stroke();
    ctx.font="12px Arial"; ctx.fillStyle="#aaa"; ctx.textAlign="center";
    ctx.fillText("Maa Narmada Yoga Bhopal  \u2022  Contact: 7415602011",W/2,FT+30);
    const link=document.createElement("a");
    link.download=(d.invoiceNo||"invoice")+"-invoice.png";
    link.href=canvas.toDataURL("image/png");
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    btn.disabled=false; btn.innerHTML="\u2B07\u00A0 Download Invoice (Image)";
  }

  const img=new Image();
  img.onload  = () => drawInvoice(img);
  img.onerror = () => drawInvoice(null);
  img.src = logoB64;
}
</script>
