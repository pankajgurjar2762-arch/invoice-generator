<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Invoice - Maa Narmada Yoga</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .header { text-align:center; margin-bottom:20px; }
    .header img { width:80px; }
    .header p { margin: 5px 0; }
    .valid::after {
      content: "";
      position: fixed;
      top: 30%;
      left: 25%;
      width: 400px;
      height: 400px;
      background: url('logo.png') no-repeat center center;
      background-size: contain;
      opacity: 0.15;
      pointer-events: none;
    }
    .result { margin-top: 20px; padding: 15px; border: 2px solid #333; max-width: 100%; }
    #reader { margin-top: 20px; max-width:100%; }
    .footer { text-align:center; border-top: 2px solid #333; margin-top: 20px; padding-top: 10px; font-size: 12px; }
    .btn { margin-top: 10px; padding: 8px 12px; }

    @media (max-width: 600px) {
      body { margin: 10px; }
      .header img { width:60px; }
      .result { width: 100%; font-size: 14px; }
      #reader { width: 100% !important; }
      .btn { width: 100%; margin-top: 8px; }
    }

    /* Print Styles */
    @media print {
      body * { visibility: hidden; }
      #result, #result * { visibility: visible; }
      #result { position: absolute; top: 0; left: 0; width: 100%; }

      /* Watermark on every page - straight center */
      body {
        background: url('logo.png') no-repeat center center;
        background-size: 280px 280px;
        opacity: 0.08;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    @media print and (max-width: 600px) {
      body {
        background-size: 150px 150px;
        opacity: 0.06;
      }
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Maa Narmada Yoga Logo">
    <h2>Maa Narmada Yoga Bhopal</h2>
    <p>📞 Contact: 7415602011</p>
  </div>

  <h3>Verify Invoice</h3>
  <label>Enter Invoice Number:</label> 
  <input type="text" id="invoiceNo">
  <button onclick="verifyInvoice()" class="btn">Verify by Invoice No</button>

  <br><br>
  <label>Enter Registration Number:</label> 
  <input type="text" id="regNo">
  <button onclick="verifyByReg()" class="btn">Verify by Registration No</button>

  <h3>Or Scan QR Code</h3>
  <div id="reader" style="width:300px;"></div>

  <div id="result"></div>

  <!-- Print Button -->
  <button onclick="printInvoice()" class="btn">🖨️ Print Invoice</button>

  <div class="footer">
    <p>Thank you for choosing Maa Narmada Yoga Bhopal</p>
    <p>📞 For queries call: 7415602011</p>
  </div>

  <script>
    let currentRecord = null;

    function showValid(record){
      currentRecord = record;
      document.body.classList.add("valid");
      document.getElementById("result").innerHTML = `
        <div class="result">
          <div style="text-align:center;">
            <img src="logo.png" alt="Maa Narmada Yoga Logo" width="60">
            <h3>Maa Narmada Yoga Bhopal</h3>
          </div>
          <h3>✅ Valid Invoice</h3>
          <p>Invoice No: ${record.invoiceNo}</p>
          <p>Name: ${record.name}</p>
          <p>Registration No: ${record.regNo}</p>
          <p>Class Location: ${record.location}</p>
          <p>Service/Month: ${record.service}</p>
          <p>Amount: ₹${record.amount}</p>
          <p>Date: ${record.date}</p>
          <p><strong>Generated By Trainer:</strong> ${record.trainer}</p>
          <hr>
          <p style="text-align:center;font-size:12px;">Maa Narmada Yoga Bhopal • Contact: 7415602011</p>
        </div>
      `;
    }

    function showInvalid(reason){
      currentRecord = null;
      document.body.classList.remove("valid");
      document.getElementById("result").innerHTML = `<h3>❌ Invalid Invoice (${reason})</h3>`;
    }

    function verifyRecord(invoiceNo){
      let data = localStorage.getItem(invoiceNo);
      if(data){
        let record = JSON.parse(data);
        let expectedHash = btoa(record.invoiceNo + "|" + record.name.trim() + "|" + record.regNo.trim() + "|" + record.location.trim() + "|" + record.amount + "|" + record.trainer);
        if(record.hash === expectedHash){
          showValid(record);
        } else {
          showInvalid("Hash mismatch");
        }
      } else {
        showInvalid("Not found");
      }
    }

    function verifyInvoice(){
      let invoiceNo = document.getElementById("invoiceNo").value.trim();
      verifyRecord(invoiceNo);
    }

    function verifyByReg(){
      let regNo = document.getElementById("regNo").value.trim();
      let found = false;
      for(let i=0; i<localStorage.length; i++){
        let key = localStorage.key(i);
        if(key.startsWith("INV-")){
          let record = JSON.parse(localStorage.getItem(key));
          if(record.regNo.trim() === regNo){
            found = true;
            let expectedHash = btoa(record.invoiceNo + "|" + record.name.trim() + "|" + record.regNo.trim() + "|" + record.location.trim() + "|" + record.amount + "|" + record.trainer);
            if(record.hash === expectedHash){
              showValid(record);
            } else {
              showInvalid("Hash mismatch");
            }
            break;
          }
        }
      }
      if(!found){
        showInvalid("Registration No not found");
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      let parts = decodedText.split("|");
      let invoiceNo = parts[0].trim();
      verifyRecord(invoiceNo);
    }

    let html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    function printInvoice(){
      if(currentRecord){
        window.print();
      } else {
        alert("पहले कोई valid invoice verify करें!");
      }
    }
  </script>
</body>
</html>
