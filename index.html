<script>
  const trainers = {
    "Kartik": "Kartik2253",
    "Trainer": "MNYT101",
    "Admin": "MNYA7794"
  };

  let loggedTrainer = "";
  let currentInvoice = {};

  function login(){
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();
    if(trainers[user] && trainers[user] === pass){
      loggedTrainer = user;
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("invoiceSection").style.display = "block";
    } else {
      document.getElementById("loginMsg").innerText = "❌ Invalid Username or Password";
    }
  }

  let invoiceCounter = localStorage.getItem("invoiceCounter") || 1;

  document.getElementById("invoiceForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let regNo = document.getElementById("regNo").value;
    let location = document.getElementById("location").value;
    let service = document.getElementById("service").value;
    let amount = document.getElementById("amount").value;

    let invoiceNo = "INV-" + String(invoiceCounter).padStart(3,'0');
    let date = new Date().toLocaleDateString();

    // 🔑 Month-Year key for uniqueness
    let monthYear = new Date().toLocaleDateString("en-GB", { month: "2-digit", year: "numeric" }).replace("/", "-");
    let storageKey = regNo + "-" + monthYear + "-" + invoiceNo;

    let hash = btoa(invoiceNo + "|" + name + "|" + regNo + "|" + location + "|" + amount + "|" + loggedTrainer);

    currentInvoice = {invoiceNo, name, regNo, location, service, amount, date, trainer: loggedTrainer, hash};
    localStorage.setItem(storageKey, JSON.stringify(currentInvoice));
    localStorage.setItem("invoiceCounter", ++invoiceCounter);

    let output = `
      <div class="invoice-details" id="invoiceDetails">
        <table>
          <tr><td><strong>Invoice No:</strong></td><td>${invoiceNo}</td></tr>
          <tr><td><strong>Date:</strong></td><td>${date}</td></tr>
          <tr><td><strong>Name:</strong></td><td>${name}</td></tr>
          <tr><td><strong>Registration No:</strong></td><td>${regNo}</td></tr>
          <tr><td><strong>Class Location:</strong></td><td>${location}</td></tr>
          <tr><td><strong>Service/Month:</strong></td><td>${service}</td></tr>
          <tr><td><strong>Amount:</strong></td><td>₹${amount}</td></tr>
          <tr><td><strong>Generated By:</strong></td><td>${loggedTrainer}</td></tr>
        </table>
        <div id="qrcode"></div>
      </div>
    `;
    document.getElementById("invoiceOutput").innerHTML = output;

    new QRCode(document.getElementById("qrcode"), invoiceNo + "|" + amount + "|" + hash);
  });

  function downloadPDF(){
    if(!currentInvoice.invoiceNo){
      alert("No invoice generated yet!");
      return;
    }
    const { jsPDF } = window.jspdf;
    let invoiceElement = document.getElementById("invoiceDetails");

    html2canvas(invoiceElement, { scale: 2 }).then(canvas => {
      let imgData = canvas.toDataURL("image/png");
      let pdf = new jsPDF("p", "mm", "a4");
      let pageWidth = pdf.internal.pageSize.getWidth();
      let imgWidth = pageWidth;
      let imgHeight = canvas.height * imgWidth / canvas.width;

      pdf.addImage(imgData, "PNG", 0, 10, imgWidth, imgHeight);
      pdf.save(currentInvoice.invoiceNo + ".pdf");
    });
  }
</script>
