<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maa Narmada Yoga - Invoice Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .page { max-width: 800px; margin: auto; padding: 20px; border: 1px solid #333; background: #fff; }
    .header { text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    .header img { width:80px; }
    .invoice-details table { width:100%; border-collapse: collapse; }
    .invoice-details td { padding: 6px; }
    .footer { text-align:center; border-top: 2px solid #333; margin-top: 20px; padding-top: 10px; font-size: 12px; }
    .btn { margin-top: 10px; padding: 8px 12px; }
    #invoiceSection { display: none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <img src="logo.png" alt="Maa Narmada Yoga Logo">
      <h2>Maa Narmada Yoga Bhopal</h2>
      <p><strong>Official Invoice</strong></p>
      <p>📞 Contact: 7415602011</p>
    </div>

    <!-- Login -->
    <div id="loginSection">
      <h3>Trainer Login</h3>
      <label>Username:</label> <input type="text" id="username"><br><br>
      <label>Password:</label> <input type="password" id="password"><br><br>
      <button onclick="login()" class="btn">Login</button>
      <p id="loginMsg" style="color:red;"></p>
    </div>

    <!-- Invoice -->
    <div id="invoiceSection">
      <h3>Invoice Generator</h3>
      <form id="invoiceForm">
        <label>Name:</label> <input type="text" id="name" required><br><br>
        <label>Registration No:</label> <input type="text" id="regNo" required><br><br>
        <label>Class Location:</label> <input type="text" id="location" required><br><br>
        <label>Service/Month:</label> <input type="text" id="service" required><br><br>
        <label>Amount:</label> <input type="number" id="amount" required><br><br>
        <button type="submit" class="btn">Generate Invoice</button>
      </form>
      <div id="invoiceOutput"></div>
      <button onclick="downloadPDF()" class="btn">📄 Download PDF</button>
      <button onclick="printInvoice()" class="btn">🖨️ Print Invoice</button>
    </div>

    <div class="footer">
      <p>Thank you for choosing Maa Narmada Yoga Bhopal</p>
      <p>📞 For queries call: 7415602011</p>
    </div>
  </div>

<script>
const trainers = { "Kartik":"Kartik2253","Trainer":"MNYT101","Admin":"MNYA7794" };
let loggedTrainer = "";
let currentInvoice = {};
// ✅ Updated with your actual Web App URL
const scriptURL = "https://script.google.com/macros/s/AKfycbzt5rT59R2lEMGWrx0gHrSDvx7so08PIMS3nDG3FUddXMoZlirTkz-3IOXxovVEjuwOmg/exec";

function login(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  if(trainers[u] && trainers[u]===p){
    loggedTrainer=u;
    document.getElementById("loginSection").style.display="none";
    document.getElementById("invoiceSection").style.display="block";
  } else document.getElementById("loginMsg").innerText="❌ Invalid Username/Password";
}

let invoiceCounter=localStorage.getItem("invoiceCounter")||1;
document.getElementById("invoiceForm").addEventListener("submit",function(e){
  e.preventDefault();
  let name=document.getElementById("name").value;
  let regNo=document.getElementById("regNo").value;
  let location=document.getElementById("location").value;
  let service=document.getElementById("service").value;
  let amount=document.getElementById("amount").value;
  let invoiceNo="INV-"+String(invoiceCounter).padStart(3,'0');
  let date=new Date().toLocaleDateString();
  let hash=btoa(invoiceNo+"|"+name+"|"+regNo+"|"+location+"|"+amount+"|"+loggedTrainer);
  currentInvoice={invoiceNo,name,regNo,location,service,amount,date,trainer:loggedTrainer,hash};
  localStorage.setItem(invoiceNo,JSON.stringify(currentInvoice));
  localStorage.setItem("invoiceCounter",++invoiceCounter);

  document.getElementById("invoiceOutput").innerHTML=`
    <div class="invoice-details" id="invoiceResult">
      <table>
        <tr><td><strong>Invoice No:</strong></td><td>${invoiceNo}</td></tr>
        <tr><td><strong>Date:</strong></td><td>${date}</td></tr>
        <tr><td><strong>Name:</strong></td><td>${name}</td></tr>
        <tr><td><strong>Registration No:</strong></td><td>${regNo}</td></tr>
        <tr><td><strong>Class Location:</strong></td><td>${location}</td></tr>
        <tr><td><strong>Service/Month:</strong></td><td>${service}</td></tr>
        <tr><td><strong>Amount:</strong></td><td>₹${amount}</td></tr>
        <tr><td><strong>Generated By:</strong></td><td>${loggedTrainer}</td></tr>
      </table>
      <div id="qrcode"></div>
    </div>`;
  new QRCode(document.getElementById("qrcode"), invoiceNo+"|"+amount+"|"+hash);
  saveToGoogleSheet(currentInvoice);
});

function saveToGoogleSheet(record){
  fetch(scriptURL,{method:"POST",body:JSON.stringify(record)})
  .then(res=>console.log("Saved to Google Sheet"))
  .catch(err=>console.error("Error:",err));
}

function downloadPDF(){
  if(!currentInvoice){alert("❌ कोई invoice नहीं मिला!");return;}
  const { jsPDF }=window.jspdf;
  html2canvas(document.getElementById("invoiceResult"),{scale:2}).then(canvas=>{
    let imgData=canvas.toDataURL("image/png");
    let pdf=new jsPDF("p","mm","a4");
    let imgWidth=190;let imgHeight=canvas.height*imgWidth/canvas.width;
    pdf.addImage(imgData,"PNG",10,20,imgWidth,imgHeight);
    pdf.save(currentInvoice.invoiceNo+"-invoice.pdf");
  });
}

function printInvoice(){
  let element=document.getElementById("invoiceResult");
  if(!element){alert("❌ कोई invoice नहीं मिला!");return;}
  let w=window.open('','','width=800,height=600');
  w.document.write('<html><head><title>Invoice Print</title></head><body>');
  w.document.write(element.innerHTML);
  w.document.write('</body></html>');
  w.document.close();w.focus();w.print();w.close();
}
</script>
</body>
</html>
