<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Invoice - Maa Narmada Yoga</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .header { text-align:center; margin-bottom:20px; }
    .header img { width:80px; }
    .header p { margin: 5px 0; }
    .form-group { margin-bottom: 10px; }
    .btn { margin-top: 10px; padding: 8px 12px; }

    @media (max-width: 600px) {
      body { margin: 10px; }
      .header img { width:60px; }
      .btn { width: 100%; margin-top: 8px; }
    }

    @media print {
      .btn, input, button { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Maa Narmada Yoga Logo">
    <h2>Maa Narmada Yoga Bhopal</h2>
    <p>📞 Contact: 7415602011</p>
  </div>

  <h3>Generate Invoice</h3>
  <div class="form-group">
    Invoice No: <input type="text" id="invoiceNo" required>
  </div>
  <div class="form-group">
    Name: <input type="text" id="name" required>
  </div>
  <div class="form-group">
    Registration No: <input type="text" id="regNo" required>
  </div>
  <div class="form-group">
    Class Location: <input type="text" id="location" required>
  </div>
  <div class="form-group">
    Service/Month: <input type="text" id="service" required>
  </div>
  <div class="form-group">
    Amount: <input type="number" id="amount" required>
  </div>
  <div class="form-group">
    Date: <input type="date" id="date" required>
  </div>
  <div class="form-group">
    Trainer: <input type="text" id="trainer" required>
  </div>

  <button onclick="generateInvoice()" class="btn">Generate & Save</button>

  <script>
    function generateInvoice(){
      let record = {
        invoiceNo: document.getElementById("invoiceNo").value.trim(),
        name: document.getElementById("name").value.trim(),
        regNo: document.getElementById("regNo").value.trim(),
        location: document.getElementById("location").value.trim(),
        service: document.getElementById("service").value.trim(),
        amount: document.getElementById("amount").value.trim(),
        date: document.getElementById("date").value.trim(),
        trainer: document.getElementById("trainer").value.trim()
      };

      // Hash generate
      record.hash = btoa(
        record.invoiceNo + "|" + record.name + "|" + record.regNo + "|" + record.location + "|" + record.amount + "|" + record.trainer
      );

      // Save invoice with both keys (InvoiceNo & RegNo)
      let data = JSON.stringify(record);
      localStorage.setItem(record.invoiceNo, data);
      localStorage.setItem(record.regNo, data);

      alert("✅ Invoice saved successfully!\nYou can verify using Invoice No OR Registration No.");
    }
  </script>
</body>
</html>
